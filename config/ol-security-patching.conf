# Runtime configuration for /usr/local/sbin/ol-security-patch.sh.
#
# PATCH_MODE:
#   security - apply only security errata updates.
#   all      - apply all available package updates.
PATCH_MODE=security

# REBOOT_POLICY:
#   mark-only - create REBOOT_MARKER when needs-restarting reports a reboot is required.
#   ignore    - do not create a reboot marker.
REBOOT_POLICY=mark-only

# Whether to expire package metadata before each run.
CLEAN_CACHE=true

# Output and state paths.
LOG_FILE=/var/log/ol-security-patch.log
LOCK_FILE=/var/run/ol-security-patch.lock
REBOOT_MARKER=/var/run/reboot-required-by-security-patch

# Optional executable hooks. Leave empty to disable.
PRE_PATCH_HOOK=
POST_PATCH_HOOK=
